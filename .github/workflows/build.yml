name: Build 3DS CIA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install LoveBrew Compiler
        run: |
          wget https://github.com/LOVEBrew/lovebrew/releases/latest/download/lovebrew-linux-x86_64 -O lovebrew
          chmod +x lovebrew

      - name: Compile Game
        run: ./lovebrew build

      - name: Upload CIA File
        uses: actions/upload-artifact@v4
        with:
          name: 3ds-game-cia
          path: build/ctr/*.cia
          
